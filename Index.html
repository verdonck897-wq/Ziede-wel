<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stableford Calculator - By Matthijs Verdonck</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-dark: #1a2e1a;
            --green-mid: #2d5a2d;
            --green-bright: #4a9e4a;
            --green-light: #7bc47b;
            --cream: #faf8f3;
            --text-dark: #1a1a1a;
            --text-mid: #444;
            --text-light: #888;
            --accent: #c8a84b;
            --accent-dark: #a88a3a;
            --red: #c0392b;
            --shadow-lg: 0 8px 48px rgba(0,0,0,0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--green-dark);
            min-height: 100vh;
            color: var(--text-dark);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(74,158,74,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(45,90,45,0.3) 0%, transparent 50%);
            padding-bottom: 50px;
        }

        header { text-align: center; padding: 40px 20px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--cream); letter-spacing: -0.02em; }
        header h1 span { color: var(--accent); }
        .divider { width: 60px; height: 2px; background: var(--accent); margin: 15px auto; opacity: 0.7; }

        .container { max-width: 960px; margin: 0 auto; padding: 0 16px; }

        .setup-card {
            background: var(--cream);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }
        .setup-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--green-mid), var(--accent), var(--green-bright));
        }

        .setup-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; align-items: end; }
        .field-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-light); }
        select, input {
            font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 12px;
            border: 2px solid #e0ddd6; border-radius: 10px; outline: none; width: 100%;
        }
        select:focus, input:focus { border-color: var(--green-bright); }

        .hcp-badge {
            background: var(--green-dark); color: var(--accent); border-radius: 10px;
            padding: 12px; font-family: 'DM Mono', monospace; font-size: 1.2rem;
            text-align: center; min-height: 48px; display: flex; align-items: center; justify-content: center;
        }

        .scorecard { background: var(--cream); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-lg); margin-bottom: 25px; }
        .scorecard-header { background: var(--green-dark); padding: 18px 25px; display: flex; justify-content: space-between; align-items: center; }
        .scorecard-header h2 { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 1.2rem; }
        .badge { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.85rem; }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--green-mid); color: white; padding: 12px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .hole-num { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--green-mid); text-align: left; padding-left: 25px; }
        .si-cell { color: var(--text-light); font-size: 0.85rem; }
        .extra-cell { font-family: 'DM Mono', monospace; font-weight: 700; color: var(--accent-dark); }
        .pts-cell { font-family: 'DM Mono', monospace; font-weight: 700; font-size: 1.1rem; }

        .slagen-input {
            font-family: 'DM Mono', monospace; width: 60px; padding: 8px; text-align: center;
            border: 2px solid #ddd; border-radius: 8px; outline: none; font-weight: 600;
        }
        .slagen-input:focus { border-color: var(--green-bright); background: #fff; }
        .filled { background: #f0faf0; border-color: var(--green-bright); }

        .summary-card { background: var(--cream); border-radius: 20px; padding: 30px; box-shadow: var(--shadow-lg); }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 20px; }
        .summary-item { background: white; border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #eee; transition: 0.2s; }
        .summary-item .val { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--green-dark); font-weight: 900; }
        .summary-item .lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-light); margin-top: 5px; }
        .summary-item.highlight { background: var(--green-dark); }
        .summary-item.highlight .val { color: var(--accent); }
        .summary-item.highlight .lbl { color: rgba(255,255,255,0.5); }

        .pts-0 { color: var(--red); }
        .pts-1 { color: #888; }
        .pts-2 { color: var(--text-dark); }
        .pts-3 { color: var(--green-bright); }
        .pts-4 { color: var(--accent); }
    </style>
</head>
<body>

<header>
    <h1>Stableford <span>Calculator</span></h1>
    <div class="divider"></div>
</header>

<div class="container">
    <div class="setup-card">
        <div class="setup-grid">
            <div class="field-group">
                <label>Exact Handicap</label>
                <input type="number" id="hcp" value="36.0" step="0.1" oninput="renderTable()">
            </div>
            <div class="field-group">
                <label>Golfclub</label>
                <select id="club" onchange="populateModes(); renderTable();">
                    <option value="Nuclea">Nuclea</option>
                    <option value="Steenhoven">Steenhoven</option>
                    <option value="Kempense">Kempense</option>
                    </select>
            </div>
            <div class="field-group">
                <label>Spelmodus</label>
                <select id="mode" onchange="populateTees(); renderTable();"></select>
            </div>
            <div class="field-group">
                <label>Teebox</label>
                <select id="tee" onchange="renderTable()"></select>
            </div>
            <div class="field-group">
                <label>Speelhandicap</label>
                <div class="hcp-badge" id="phcp-val">0</div>
            </div>
        </div>
    </div>

    <div id="cardContainer"></div>

    <div class="summary-card" id="summaryCard" style="display:none;">
        <h2 style="font-family:'Playfair Display',serif; color:var(--green-dark);">Resultaten</h2>
        <div class="summary-grid">
            <div class="summary-item">
                <div class="val" id="sumOut">—</div>
                <div class="lbl">Punten Uit</div>
            </div>
            <div class="summary-item">
                <div class="val" id="sumIn">—</div>
                <div class="lbl">Punten In</div>
            </div>
            <div class="summary-item highlight">
                <div class="val" id="sumTotal">—</div>
                <div class="lbl">Totaal Punten</div>
            </div>
            <div class="summary-item">
                <div class="val" id="sumHoles">—</div>
                <div class="lbl">Holes Gespeeld</div>
            </div>
        </div>
    </div>
</div>

<script>

                "rood": {"cr": 30.5, "sr": 99, "par_total": 33, "color": "#c0392b"},
                "geel": {"cr": 30.9, "sr": 112, "par_total": 33, "color": "#f1c40f"}
            }
        }
    },
    "Steenhoven": {
        "full 18": {
            "name": "Steenhoven (18 Holes)",
            "par": [5, 4, 5, 4, 4, 4, 3, 4, 4, 3, 5, 4, 5, 4, 4, 3, 4, 3],
            "si": [11, 5, 1, 17, 7, 3, 15, 9, 13, 10, 2, 18, 4, 8, 16, 6, 12, 14],
            "tees": {

                "blauw": {"cr": 67.9, "sr": 121, "par_total": 72, "color": "#2980b9"},

                "wit": {"cr": 71.3, "sr": 129, "par_total": 72, "color": "#ecf0f1"}
            }
        },
        "front 9": {
            "name": "Steenhoven (Front 9)",
            "par": [5, 4, 5, 4, 4, 4, 3, 4, 4],
            "si": [3, 9, 1, 6, 7, 4, 8, 5, 2],
            "tees": {
                "rood": {"cr": 34.3, "sr": 118, "par_total": 37, "color": "#c0392b"},
                "blauw": {"cr": 35.2, "sr": 122, "par_total": 37, "color": "#2980b9"},
                "geel": {"cr": 36.5, "sr": 127, "par_total": 37, "color": "#f1c40f"},
                "wit": {"cr": 37.4, "sr": 131, "par_total": 37, "color": "#ecf0f1"}
            }
        },
        "back 9": {
            "name": "Steenhoven (Back 9)",
            "par": [3, 5, 4, 5, 4, 4, 3, 4, 3],
            "si": [9, 1, 5, 7, 6, 3, 4, 2, 8],
            "tees": {

                "blauw": {"cr": 32.7, "sr": 120, "par_total": 35, "color": "#2980b9"},
                "geel": {"cr": 33.5, "sr": 124, "par_total": 35, "color": "#f1c40f"},
                "wit": {"cr": 34.4, "sr": 128, "par_total": 35, "color": "#ecf0f1"}
            }
        }
    },
    "Kempense": {
        "full 18": {
            "name": "Kempense (18 Holes)",
            "par": [5, 3, 4, 4, 4, 3, 4, 3, 5, 4, 4, 5, 4, 3, 4, 5, 3, 5],
            "si": [4, 16, 2, 14, 18, 12, 6, 10, 8, 7, 11, 5, 1, 15, 13, 9, 17, 3],
            "tees": {
                "oranje": {"cr": 62.9, "sr": 104, "par_total": 72, "color": "#f5a623"},
                "rood": {"cr": 65.9, "sr": 110, "par_total": 72, "color": "#c0392b"},
                "blauw": {"cr": 67.5, "sr": 115, "par_total": 72, "color": "#2980b9"},
                "geel": {"cr": 69.6, "sr": 118, "par_total": 72, "color": "#f1c40f"},
                "wit": {"cr": 71.0, "sr": 127, "par_total": 72, "color": "#ecf0f1"},
                "zwart": {"cr": 71.2, "sr": 127, "par_total": 72, "color": "#2c3e50"}
            }
        },
        "front 9": {
            "name": "Kempense (Front 9)",
            "par": [5, 3, 4, 4, 4, 3, 4, 3, 5],
            "si": [2, 8, 1, 7, 9, 6, 3, 5, 4],
            "tees": {
                "oranje": {"cr": 30.1, "sr": 93, "par_total": 35, "color": "#f5a623"},
                "rood": {"cr": 31.4, "sr": 99, "par_total": 35, "color": "#c0392b"},
                "blauw": {"cr": 32.2, "sr": 104, "par_total": 35, "color": "#2980b9"},
                "geel": {"cr": 33.1, "sr": 114, "par_total": 35, "color": "#f1c40f"},
                "zwart": {"cr": 34.0, "sr": 127, "par_total": 35, "color": "#2c3e50"},
                "wit": {"cr": 33.8, "sr": 126, "par_total": 35, "color": "#ecf0f1"}
            }
        },
        "back 9": {
            "name": "Kempense (Back 9)",
            "par": [4, 4, 5, 4, 3, 4, 5, 3, 5],
            "si": [4, 6, 3, 1, 8, 7, 5, 9, 2],
            "tees": {
                "oranje": {"cr": 32.8, "sr": 114, "par_total": 37, "color": "#f5a623"},
                "rood": {"cr": 34.5, "sr": 121, "par_total": 37, "color": "#c0392b"},
                "blauw": {"cr": 35.3, "sr": 125, "par_total": 37, "color": "#2980b9"},
                "geel": {"cr": 36.5, "sr": 122, "par_total": 37, "color": "#f1c40f"},
                "zwart": {"cr": 37.2, "sr": 127, "par_total": 37, "color": "#2c3e50"},
                "wit": {"cr": 37.2, "sr": 127, "par_total": 37, "color": "#ecf0f1"}
            }
        }
    },
    
};

function populateModes() {
    const clubName = document.getElementById('club').value;
    const modeSelect = document.getElementById('mode');
    modeSelect.innerHTML = "";
    Object.keys(courseData[clubName]).forEach(m => {
        let opt = document.createElement('option');
        opt.value = m;
        opt.innerHTML = m.charAt(0).toUpperCase() + m.slice(1);
        modeSelect.appendChild(opt);
    });
    populateTees();
}

function populateTees() {
    const clubName = document.getElementById('club').value;
    const mode = document.getElementById('mode').value;
    const teeSelect = document.getElementById('tee');
    teeSelect.innerHTML = "";
    if(!mode) return;
    Object.keys(courseData[clubName][mode].tees).forEach(t => {
        let opt = document.createElement('option');
        opt.value = t;
        opt.innerHTML = t.charAt(0).toUpperCase() + t.slice(1);
        teeSelect.appendChild(opt);
    });
}

function renderTable() {
    const clubName = document.getElementById('club').value;
    const mode = document.getElementById('mode').value;
    const teeName = document.getElementById('tee').value;
    const hcp = parseFloat(document.getElementById('hcp').value) || 0;
    
    if(!mode || !teeName) return;

    const gameData = courseData[clubName][mode];
    const tee = gameData.tees[teeName];
    const numHoles = gameData.par.length;
    const is9 = (numHoles === 9);
    
    const phcp = Math.round(is9 ? (hcp/2 * (tee.sr/113)) + (tee.cr - tee.par_total) : (hcp * (tee.sr/113)) + (tee.cr - tee.par_total));
    document.getElementById('phcp-val').innerText = phcp;

    const baseExtra = Math.floor(phcp / numHoles);
    const remainder = phcp % numHoles;

    let html = `
        <div class="scorecard">
            <div class="scorecard-header">
                <h2>📋 Scorekaart</h2>
                <div style="display:flex; gap:10px; align-items:center;">
                    <button class="btn-reset" onclick="renderTable()">↺ Wis alles</button>
                    <div class="badge">${gameData.name}</div>
                </div>
            </div>
            <table>
                <thead>
                    <tr><th>Hole</th><th>Par</th><th>SI</th><th>Extra</th><th>Slagen</th><th>Punten</th></tr>
                </thead>
                <tbody>`;

    for (let i = 0; i < numHoles; i++) {
        const si = gameData.si[i];
        let extra = baseExtra + (phcp >= 0 ? (si <= remainder ? 1 : 0) : (si > (numHoles + phcp) ? -1 : 0));
        const holeNum = (mode === "back" && clubName !== "Witloop" && clubName !== "Lilse Golfclub") ? (i + 10) : (i + 1);

        html += `<tr>
            <td class="hole-num">${holeNum}</td>
            <td>${gameData.par[i]}</td>
            <td class="si-cell">${si}</td>
            <td class="extra-cell">${extra > 0 ? '+' + extra : extra}</td>
            <td><input type="number" class="slagen-input" id="s-${i}" oninput="updateTotals()"></td>
            <td id="p-${i}" class="pts-cell">—</td>
        </tr>`;
    }

    html += `</tbody></table></div>`;
    document.getElementById('cardContainer').innerHTML = html;
    updateTotals();
}

function updateTotals() {
    const clubName = document.getElementById('club').value;
    const mode = document.getElementById('mode').value;
    const phcp = parseInt(document.getElementById('phcp-val').innerText);
    const gameData = courseData[clubName][mode];
    const numHoles = gameData.par.length;
    const baseExtra = Math.floor(phcp / numHoles);
    const remainder = phcp % numHoles;

    let outP = 0, inP = 0, totalP = 0, holesPlayed = 0;

    for (let i = 0; i < numHoles; i++) {
        const input = document.getElementById(`s-${i}`);
        const val = parseInt(input.value);
        if(!isNaN(val) && val > 0) {
            input.classList.add('filled');
            holesPlayed++;
            const si = gameData.si[i];
            let extra = baseExtra + (phcp >= 0 ? (si <= remainder ? 1 : 0) : (si > (numHoles + phcp) ? -1 : 0));
            let pts = Math.max(0, 2 + (gameData.par[i] + extra) - val);
            
            const cell = document.getElementById(`p-${i}`);
            cell.innerText = pts;
            cell.className = "pts-cell pts-" + (pts > 4 ? "4" : pts);
            
            totalP += pts;
            if(mode === "full") {
                if(i < 9) outP += pts; else inP += pts;
            } else {
                if(mode === "front") outP += pts; else inP += pts;
            }
        } else {
            input.classList.remove('filled');
            document.getElementById(`p-${i}`).innerText = "—";
        }
    }

    document.getElementById('summaryCard').style.display = holesPlayed > 0 ? "block" : "none";
    document.getElementById('sumOut').innerText = outP;
    document.getElementById('sumIn').innerText = inP;
    document.getElementById('sumTotal').innerText = totalP;
    document.getElementById('sumHoles').innerText = holesPlayed + "/" + numHoles;
}

populateModes();
</script>
</body>
</html>"""
